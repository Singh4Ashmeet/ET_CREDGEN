<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Application — CredGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .status-page {
            max-width: 560px;
            margin: 6rem auto 2rem;
            padding: 0 1.5rem;
        }

        .status-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: .5rem;
        }

        .status-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .lookup-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 500;
            margin-bottom: .4rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: .9rem;
            font-family: var(--font);
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-lookup {
            width: 100%;
            padding: .85rem;
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-lookup:hover {
            box-shadow: none;
            border: 1px solid var(--border-focus);
            transform: none;
        }

        .error-msg {
            color: var(--danger);
            font-size: .85rem;
            text-align: center;
            margin-top: 1rem;
        }

        /* Result card */
        .result-card {
            margin-top: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            animation: slideIn .3s ease;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .result-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status-badge {
            padding: .3rem .75rem;
            border-radius: 100px;
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }

        .status-badge.approved {
            background: transparent;
            color: var(--accent);
        }

        .status-badge.rejected {
            background: transparent;
            color: var(--danger);
        }

        .status-badge.initiated {
            background: transparent;
            color: var(--primary);
        }

        .status-badge.processing {
            background: transparent;
            color: var(--warning);
        }

        .result-details {
            margin-bottom: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: .9rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .label {
            color: var(--text-secondary);
        }

        .detail-row .value {
            font-weight: 600;
        }

        /* Timeline */
        .timeline {
            margin-top: 1.5rem;
        }

        .timeline h4 {
            font-size: .9rem;
            font-weight: 600;
            margin-bottom: .75rem;
            color: var(--text);
        }

        .timeline-item {
            display: flex;
            gap: .75rem;
            margin-bottom: .5rem;
        }

        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: .35rem;
            flex-shrink: 0;
        }

        .timeline-dot.done {
            background: var(--accent);
        }

        .timeline-dot.current {
            background: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .timeline-dot.pending {
            background: var(--border);
        }

        .timeline-text {
            font-size: .85rem;
            color: var(--text-secondary);
        }

        .result-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .result-actions a,
        .result-actions button {
            flex: 1;
            padding: .6rem;
            text-align: center;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: .85rem;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: var(--font);
        }

        .result-actions a:hover,
        .result-actions button:hover {
            opacity: .9;
            transform: none;
        }
    </style>
    <script>
        // Force Initial Theme to Dark First Concept (since we handle it globally anyway via OS/preferences, 
        // but the system defaults to dark now unless overridden in localStorage)
        const savedTheme = localStorage.getItem('credgen_theme');
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="nav-brand" style="text-decoration:none">
            <div class="nav-logo">
                <i class="bi bi-lightning-charge-fill"></i>
            </div>
            <span class="nav-title">CredGen</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link"><i class="bi bi-house"></i> Home</a>
        </div>
    </nav>

    <div class="status-page">
        <h1 class="status-title">Track Your Application</h1>
        <p class="status-subtitle">Enter your registered phone number and PAN to check status</p>

        <div class="lookup-form" id="lookup-form">
            <div class="form-group">
                <label for="status-phone">Mobile Number</label>
                <input type="tel" id="status-phone" placeholder="10-digit mobile number" maxlength="10">
            </div>
            <div class="form-group">
                <label for="status-pan">PAN Number</label>
                <input type="text" id="status-pan" placeholder="ABCDE1234F" maxlength="10"
                    style="text-transform: uppercase">
            </div>
            <button class="btn-lookup" id="btn-lookup" onclick="lookupStatus()">
                <i class="bi bi-search"></i> Check Status
            </button>
            <p class="error-msg hidden" id="status-error"></p>
        </div>

        <div id="result-container"></div>
    </div>

    <script>
        async function lookupStatus() {
            const phone = document.getElementById('status-phone').value.trim();
            const pan = document.getElementById('status-pan').value.trim().toUpperCase();
            const errorEl = document.getElementById('status-error');
            const resultEl = document.getElementById('result-container');

            errorEl.classList.add('hidden');
            resultEl.innerHTML = '';

            if (!phone || phone.length !== 10 || !/^[6-9]\d{9}$/.test(phone)) {
                errorEl.textContent = 'Please enter a valid 10-digit mobile number';
                errorEl.classList.remove('hidden');
                return;
            }
            if (!pan || !/^[A-Z]{5}\d{4}[A-Z]$/.test(pan)) {
                errorEl.textContent = 'Please enter a valid PAN number';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const resp = await fetch(`/application/status?phone=${phone}&pan=${pan}`);
                if (!resp.ok) {
                    const err = await resp.json();
                    errorEl.textContent = err.error || 'No application found';
                    errorEl.classList.remove('hidden');
                    return;
                }

                const data = await resp.json();
                renderResult(data);
            } catch (e) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.remove('hidden');
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-container');
            const statusClass = (data.status || 'initiated').toLowerCase();
            const badgeMap = {
                initiated: 'initiated', approved: 'approved', rejected: 'rejected',
                sanctioned: 'approved', disbursed: 'approved', processing: 'processing'
            };

            let html = `
                <div class="result-card">
                    <div class="result-header">
                        <h3>Application Details</h3>
                        <span class="status-badge ${badgeMap[statusClass] || 'initiated'}">${data.status || 'Initiated'}</span>
                    </div>
                    <div class="result-details">
                        <div class="detail-row"><span class="label">Application ID</span><span class="value">${String(data.application_id).slice(0, 8)}...</span></div>
                        <div class="detail-row"><span class="label">Loan Amount</span><span class="value">₹${fmtINR(data.loan_amount)}</span></div>
                        <div class="detail-row"><span class="label">Applied On</span><span class="value">${new Date(data.created_at).toLocaleDateString()}</span></div>
            `;

            if (data.offer_summary) {
                html += `
                    <div class="detail-row"><span class="label">Offered Rate</span><span class="value">${data.offer_summary.rate}%</span></div>
                    <div class="detail-row"><span class="label">EMI</span><span class="value">₹${fmtINR(data.offer_summary.emi)}</span></div>
                `;
            }
            html += '</div>';

            if (data.rejection_reason) {
                html += `<p style="color:var(--danger); font-size:.85rem; margin-top:.5rem;">Reason: ${data.rejection_reason}</p>`;
            }

            // Actions
            html += '<div class="result-actions">';
            if (data.sanction_letter_url) {
                html += `<a href="${data.sanction_letter_url}" target="_blank" style="background:var(--accent); color:white;">Download Letter</a>`;
            }
            html += `<a href="/" style="background:var(--primary-light); color:var(--primary);">Start New Application</a>`;
            html += '</div></div>';

            container.innerHTML = html;
        }

        function fmtINR(n) {
            try {
                n = Math.round(Number(n));
                const s = String(n);
                if (s.length <= 3) return s;
                const last = s.slice(-3);
                let rest = s.slice(0, -3);
                const parts = [];
                while (rest.length) { parts.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
                return parts.join(',') + ',' + last;
            } catch { return String(n); }
        }
    </script>
</body>

</html>
